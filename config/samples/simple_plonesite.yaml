apiVersion: plone.org/v1alpha1
kind: PloneSite
metadata:
  name: simple-plone
  namespace: default
spec:
  # Minimal configuration for a simple Plone site with Volto
  siteName: "Simple Plone"
  siteId: "Plone"

  # Use Volto frontend (default)
  deploymentType: "volto"

  # Admin credentials are read from a Secret named "<cr-name>-admin".
  # kubectl create secret generic simple-plone-admin \
  #   --from-literal=username=admin --from-literal=password=changeme

  # Single replica for development
  replicas: 1

  # Use ZODB with ZEO (default, no external database needed)
  database:
    type: "zodb"

  # Enable persistence
  persistence:
    enabled: true
    size: "5Gi"

  # --- Seamless mode (local dev) ---
  # Without vhmUrl, the frontend Service is NodePort so you can access it via:
  #   minikube service simple-plone-frontend
  #
  # For production with Traefik Ingress, set vhmUrl + ingress.enabled.
  # The operator will:
  #   - Set RAZZLE_API_PATH on the Volto frontend to the public URL
  #   - Set CORS_ALLOW_ORIGIN on the backend
  #   - Create a Traefik Ingress routing <host> → frontend service
  #
  # nip.io resolves *.192.168.49.2.nip.io to 192.168.49.2 (minikube IP);
  # Traefik NodePort 30121 is HTTP.
  vhmUrl: "http://simple-plone.192.168.49.2.nip.io:30121"
  ingress:
    enabled: true
    className: "traefik"
