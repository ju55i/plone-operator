apiVersion: plone.org/v1alpha1
kind: PloneSite
metadata:
  name: classic-plone
  namespace: plone
spec:
  deploymentType: "classic"
  siteId: "Plone"
  # Admin credentials are read from a Secret named "<cr-name>-admin".
  # kubectl create secret generic classic-plone-admin \
  #   --from-literal=username=admin --from-literal=password=changeme
  image: "plone/plone-backend:latest"
  replicas: 1

  # QEMU driver: minikube IP is not reachable from host.
  # Use kubectl port-forward svc/traefik 8080:80 -n kube-system, then
  # 127.0.0.1.nip.io resolves to 127.0.0.1 (loopback).
  publicUrl: "http://classic-plone.127.0.0.1.nip.io:8080"
  sitePath: "Plone"

  ingress:
    enabled: true
    className: "traefik"

  database:
    type: "zodb"
