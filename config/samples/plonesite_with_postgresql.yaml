apiVersion: plone.org/v1alpha1
kind: PloneSite
metadata:
  name: plone-with-postgresql
  namespace: default
spec:
  # Site configuration
  siteName: "Plone with PostgreSQL"
  siteId: "Plone"

  # Use Volto frontend
  deploymentType: "volto"

  # Name of the Kubernetes Secret containing admin credentials.
  # kubectl create secret generic plone-admin-secret \
  #   --from-literal=username=admin --from-literal=password=changeme
  adminPasswordSecret: "plone-admin-secret"

  # Backend image
  image: "plone/plone-backend:6.0"

  # High availability setup
  replicas: 3

  # Virtual Host Monster: the public URL Plone uses when generating links.
  # RAZZLE_API_PATH for the Volto frontend is also set to this URL.
  vhmUrl: "https://www.example.com"

  # Ingress with TLS
  ingress:
    enabled: true
    className: "traefik"
    tls: true

  # Production resources
  resources:
    limits:
      cpu: "4000m"
      memory: "4Gi"
    requests:
      cpu: "1000m"
      memory: "1Gi"

  # PostgreSQL database via CloudNativePG (in-cluster).
  # credentialsSecret must contain keys: username, password
  # (used for CNPG bootstrap; runtime credentials come from <name>-db-app Secret).
  #
  # For external PostgreSQL set cnpg: false and provide a Secret with keys:
  #   host, port, dbname, username, password.
  database:
    type: "postgresql"
    cnpg: true
    credentialsSecret: "plone-db-credentials"
    packIntervalDays: 7

  # Persistent storage
  persistence:
    enabled: true
    storageClass: "fast-ssd"
    size: "50Gi"

  # Plone add-ons
  addons:
    - "plone.restapi"
    - "plone.volto"

  # Environment variables
  environment:
    TZ: "America/New_York"
    CORS_ALLOW_ORIGIN: "https://www.example.com"
