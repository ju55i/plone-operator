apiVersion: plone.org/v1alpha1
kind: PloneSite
metadata:
  name: my-plone-site
  namespace: plone
spec:
  # Site configuration
  siteId: "plone"

  # Deployment type: 'volto' (frontend+backend) or 'classic' (backend-only)
  deploymentType: "volto"

  # Admin credentials are read from a Secret named "<cr-name>-admin".
  # kubectl create secret generic my-plone-site-admin \
  #   --from-literal=username=admin --from-literal=password=changeme

  # Plone backend image
  backendImage: "plone/plone-backend:6.0"

  # Volto frontend image (only used when deploymentType: volto)
  frontendImage: "plone/plone-frontend:18"

  # Number of replicas
  replicas: 2

  # Virtual Host Monster configuration
  # The public URL Plone uses when generating links.
  # For Classic UI: Traefik Middleware rewrites paths to the VHM traversal URL.
  # For Volto: sets RAZZLE_API_PATH on the frontend.
  publicUrl: "https://myplone.example.com"

  # Ingress configuration
  ingress:
    enabled: true
    className: "traefik"
    tls: true

  # Resource requirements
  resources:
    limits:
      cpu: "2000m"
      memory: "2Gi"
    requests:
      cpu: "500m"
      memory: "512Mi"

  # Database configuration
  # 'zodb' uses ZEO server (in-cluster StatefulSet).
  # 'postgresql' uses PostgreSQL (in-cluster CNPG or external).
  database:
    type: "zodb"
    # Pack the database weekly (set to 0 to disable).
    packIntervalDays: 7

  # Persistence configuration
  persistence:
    enabled: true
    storageClass: ""  # Use default storage class
    size: "10Gi"

  # Optional: Plone add-ons to install
  addons:
    - "plone.restapi"
    - "plone.volto"

  # Optional: Additional environment variables
  environment:
    TZ: "UTC"
    CORS_ALLOW_ORIGIN: "*"
