apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: plonesites.plone.org
spec:
  group: plone.org
  names:
    kind: PloneSite
    listKind: PloneSiteList
    plural: plonesites
    singular: plonesite
    shortNames:
      - ps
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: PloneSite is the Schema for the plonesite API
          properties:
            apiVersion:
              description: 'APIVersion defines the versioned schema of this representation of an object.'
              type: string
            kind:
              description: 'Kind is a string value representing the REST resource this object represents.'
              type: string
            metadata:
              type: object
            spec:
              description: Spec defines the desired state of PloneSite
              type: object
              properties:
                siteName:
                  description: Name of the Plone site to create
                  type: string
                  default: "Plone"
                siteId:
                  description: ID of the Plone site (URL path component)
                  type: string
                  default: "plone"
                deploymentType:
                  description: Type of deployment (volto for frontend+backend, classic for backend-only)
                  type: string
                  default: "volto"
                  enum:
                    - volto
                    - classic
                image:
                  description: Plone backend container image
                  type: string
                  default: "plone/plone-backend:latest"
                frontendImage:
                  description: Plone frontend (Volto) container image
                  type: string
                  default: "plone/plone-frontend:latest"
                replicas:
                  description: Number of Plone replicas
                  type: integer
                  default: 1
                  minimum: 1
                resources:
                  description: Resource requirements for Plone containers
                  type: object
                  properties:
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "2000m"
                        memory:
                          type: string
                          default: "2Gi"
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                          default: "500m"
                        memory:
                          type: string
                          default: "512Mi"
                publicUrl:
                  description: >
                    Public URL of the site (e.g. https://example.com).
                    Enables Ingress creation, sets CORS and Volto API path,
                    and configures Classic UI path rewriting via Traefik.
                  type: string
                sitePath:
                  description: >
                    Zope traversal path to the Plone site object, used when
                    building internal rewrite rules for Classic UI.
                    Defaults to siteId.
                  type: string
                ingress:
                  description: Ingress configuration
                  type: object
                  properties:
                    enabled:
                      description: Enable ingress
                      type: boolean
                      default: false
                    className:
                      description: Ingress class name (e.g., nginx, traefik)
                      type: string
                    tls:
                      description: Enable TLS
                      type: boolean
                      default: false
                database:
                  description: Database configuration
                  type: object
                  properties:
                    type:
                      description: Database type (zodb, postgresql, mysql)
                      type: string
                      default: "zodb"
                      enum:
                        - zodb
                        - postgresql
                        - mysql
                    cnpg:
                      description: >
                        Use CloudNativePG for in-cluster PostgreSQL.
                        When true the operator creates a CNPG Cluster and reads
                        runtime credentials from the auto-created
                        <name>-db-app Secret.
                        When false (default) an external PostgreSQL server is
                        expected and all connection details come from
                        credentialsSecret.
                      type: boolean
                      default: false
                    credentialsSecret:
                      description: >
                        Name of the Secret that holds database credentials.
                        Required for type=postgresql.

                        For external PostgreSQL (cnpg: false) the Secret must
                        contain: host, port (optional), dbname (optional),
                        username, password.

                        For in-cluster CNPG (cnpg: true) the Secret must
                        contain: username, password.  It is used only for
                        CNPG cluster bootstrap; the operator uses the
                        CNPG-generated <name>-db-app Secret at runtime.
                      type: string
                    packIntervalDays:
                      description: >
                        How often to pack the database (days).
                        Set to 0 to disable automatic packing.
                      type: integer
                      default: 7
                      minimum: 0
                persistence:
                  description: Persistence configuration
                  type: object
                  properties:
                    enabled:
                      description: Enable persistent storage
                      type: boolean
                      default: true
                    storageClass:
                      description: Storage class for persistent volume
                      type: string
                    size:
                      description: Size of persistent volume
                      type: string
                      default: "10Gi"
                addons:
                  description: List of Plone add-ons to install
                  type: array
                  items:
                    type: string
                environment:
                  description: Additional environment variables
                  type: object
                  additionalProperties:
                    type: string
            status:
              description: Status defines the observed state of PloneSite
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                conditions:
                  description: Conditions represent the latest available observations of the PloneSite's state
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                phase:
                  description: Phase of the PloneSite (Pending, Running, Failed)
                  type: string
                siteUrl:
                  description: URL to access the Plone site
                  type: string
                ingressConfigured:
                  description: Whether an Ingress has been configured
                  type: boolean
                deploymentType:
                  description: Type of deployment (volto or classic)
                  type: string
                lastPackTime:
                  description: ISO-8601 timestamp of the last successful db_pack job creation
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Site URL
          type: string
          jsonPath: .status.siteUrl
        - name: Ingress
          type: boolean
          jsonPath: .status.ingressConfigured
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
