apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: plone-operator-role
rules:
  # Permissions for managing PloneSite CRDs
  - apiGroups:
      - plone.org
    resources:
      - plonesites
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - plone.org
    resources:
      - plonesites/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - plone.org
    resources:
      - plonesites/finalizers
    verbs:
      - update
  # Permissions for managing Kubernetes resources
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - services/finalizers
      - endpoints
      - persistentvolumeclaims
      - events
      - configmaps
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
      - daemonsets
      - replicasets
      - statefulsets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Permissions for creating DB pack Jobs
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Permissions for managing CloudNativePG Cluster resources
  - apiGroups:
      - postgresql.cnpg.io
    resources:
      - clusters
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Permissions for managing Traefik Middleware resources
  - apiGroups:
      - traefik.io
    resources:
      - middlewares
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Kopf leadership election and change-watching coordination
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
