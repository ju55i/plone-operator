---
# defaults file for plonesite
plone_site_name: "{{ ansible_operator_meta.name }}"
plone_namespace: "{{ ansible_operator_meta.namespace }}"
plone_site_id: "{{ site_id | default('plone') }}"
plone_admin_user: "{{ admin_user | default('admin') }}"
plone_admin_password_secret: "{{ admin_password_secret | default('plone-admin-password') }}"
plone_image: "{{ image | default('plone/plone-backend:6.0') }}"
plone_replicas: "{{ replicas | default(1) }}"
plone_vhm_url: "{{ vhm_url | default('') }}"
plone_vhm_path: "{{ vhm_path | default(plone_site_id) }}"

# Deployment type: volto (frontend+backend) or classic (backend only)
plone_deployment_type: "{{ deployment_type | default('volto') }}"

# Ingress configuration
ingress_class_name: "{{ ingress.class_name | default('') }}"

# Resource defaults
plone_resources:
  limits:
    cpu: "{{ resources.limits.cpu | default('2000m') }}"
    memory: "{{ resources.limits.memory | default('2Gi') }}"
  requests:
    cpu: "{{ resources.requests.cpu | default('500m') }}"
    memory: "{{ resources.requests.memory | default('512Mi') }}"

# Database defaults
plone_db_type: "{{ database.type | default('zodb') }}"
plone_db_host: "{{ database.host | default('') }}"
plone_db_port: "{{ database.port | default(5432) }}"
plone_db_name: "{{ database.name | default('plone') }}"
plone_db_user: "{{ database.user | default('plone') }}"
plone_db_password_secret: "{{ database.password_secret | default('plonedb') }}"

# Persistence defaults
plone_persistence_enabled: "{{ persistence.enabled | default(true) }}"
plone_persistence_storage_class: "{{ persistence.storage_class | default('') }}"
plone_persistence_size: "{{ persistence.size | default('10Gi') }}"

# Add-ons
plone_addons: "{{ addons | default([]) }}"

# Environment variables
plone_environment: "{{ environment | default({}) }}"
